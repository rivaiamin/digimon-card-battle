name: Fidelity

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  fidelity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Fidelity scenario suite (FC-030)
        run: pnpm test:fidelity

      - name: Fidelity report artifact
        run: pnpm fidelity:report

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: fidelity-report
          path: fidelity-report.md
